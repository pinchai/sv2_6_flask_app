<!doctype html>
<html lang="en">
{% include 'front/share/header.html' %}
<body>
{% include 'front/share/navbar.html' %}

<main class="auth-page container py-5">
    <section class="auth-card border rounded-3 p-4 p-md-5 bg-white">
        <p class="eyebrow">Welcome back</p>
        <h1 class="h2 fw-bold mb-3">Login to your account</h1>
        <p class="text-muted mb-4">Access saved addresses, order history, and faster checkout.</p>

        <form>
            <div class="mb-3">
                <label class="form-label fw-bold" for="loginEmail">Email</label>
                <input class="form-control" id="loginEmail" type="email" placeholder="alex@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold" for="loginPassword">Password</label>
                <input class="form-control" id="loginPassword" type="password" placeholder="Enter password">
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberLogin">
                    <label class="form-check-label" for="rememberLogin">Remember me</label>
                </div>
                <a class="link-teal fw-bold" href="{{ url_for('forgot_password') }}">Forgot password?</a>
            </div>
            <a class="btn btn-teal w-100" href="{{ url_for('account') }}">Login</a>
        </form>

        <p class="text-center text-muted mt-4 mb-0">New customer? <a class="link-teal fw-bold"
                                                                     href="{{ url_for('create_user') }}">Create
            account</a></p>
    </section>
</main>

{% include 'front/share/footer.html' %}
</body>
</html>
