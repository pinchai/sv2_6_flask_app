<!doctype html>
<html lang="en">
{% include 'front/share/header.html' %}
<body>
{% include 'front/share/navbar.html' %}

  <main class="auth-page container py-5">
    <section class="auth-card border rounded-3 p-4 p-md-5 bg-white">
      <p class="eyebrow">Password help</p>
      <h1 class="h2 fw-bold mb-3">Reset your password</h1>
      <p class="text-muted mb-4">Enter your email address and receive a password reset link.</p>

      <form>
        <div class="mb-4">
          <label class="form-label fw-bold" for="resetEmail">Email</label>
          <input class="form-control" id="resetEmail" type="email" placeholder="alex@example.com">
        </div>
        <a class="btn btn-teal w-100" href="{{ url_for('login') }}">Send reset link</a>
      </form>

      <p class="text-center text-muted mt-4 mb-0">Remembered your password? <a class="link-teal fw-bold" href="{{ url_for('login') }}">Back to login</a></p>
    </section>
  </main>

{% include 'front/share/footer.html' %}
</body>
</html>
