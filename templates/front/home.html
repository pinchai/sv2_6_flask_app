<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK Shop | Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/style/main.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🛒 KK Shop</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Cart</a></li>
                <li class="nav-item"><a class="nav-link btn btn-primary ms-2 text-white px-3" href="#">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero -->
<section class="hero py-5 text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">Upgrade Your Style</h1>
        <p class="lead">Discover trendy products at unbeatable prices</p>
        <a href="#" class="btn btn-light btn-lg mt-3 px-4">Shop Now</a>
    </div>
</section>

<!-- Products -->
<div class="container py-5">
    <h2 class="text-center mb-4 fw-bold">Featured Products</h2>

    <div class="row g-4">

        <!-- Product -->
        <div class="col-lg-3 col-md-6">
            <div class="card">
                <img src="static/image/1.jpg">
                <div class="card-body text-center">
                    <h6>Product 1</h6>
                    <p class="price text-danger">$20</p>
                    <button class="btn btn-primary btn-cart w-100">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="card">
                <img src="static/image/2.jpg">
                <div class="card-body text-center">
                    <h6>Product 2</h6>
                    <p class="price text-danger">$30</p>
                    <button class="btn btn-primary btn-cart w-100">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="card">
                <img src="static/image/3.jpg">
                <div class="card-body text-center">
                    <h6>Product 3</h6>
                    <p class="price text-danger">$40</p>
                    <button class="btn btn-primary btn-cart w-100">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="card">
                <img src="static/image/4.jpg">
                <div class="card-body text-center">
                    <h6>Product 4</h6>
                    <p class="price text-danger">$50</p>
                    <button class="btn btn-primary btn-cart w-100">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white">
    <div class="container py-4 text-center">
        <h5>KK Shop</h5>
        <p class="mb-1">Your favorite online store</p>
        <small>© 2026 KK Shop. All rights reserved.</small>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
