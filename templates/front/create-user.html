<!doctype html>
<html lang="en">
{% include 'front/share/header.html' %}
<body>
{% include 'front/share/navbar.html' %}
<main class="auth-page container py-5">
    <section class="auth-card border rounded-3 p-4 p-md-5 bg-white">
        <p class="eyebrow">New customer</p>
        <h1 class="h2 fw-bold mb-3">Create user account</h1>
        <p class="text-muted mb-4">Create an account for quicker checkout and order tracking.</p>

        <form>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold" for="firstName">First name</label>
                    <input class="form-control" id="firstName" type="text" placeholder="Alex">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold" for="lastName">Last name</label>
                    <input class="form-control" id="lastName" type="text" placeholder="Morgan">
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold" for="createEmail">Email</label>
                    <input class="form-control" id="createEmail" type="email" placeholder="alex@example.com">
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold" for="createPassword">Password</label>
                    <input class="form-control" id="createPassword" type="password" placeholder="Create password">
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold" for="confirmPassword">Confirm password</label>
                    <input class="form-control" id="confirmPassword" type="password" placeholder="Confirm password">
                </div>
            </div>
            <a class="btn btn-teal w-100 mt-4" href="account.html">Create account</a>
        </form>

        <p class="text-center text-muted mt-4 mb-0">Already have an account? <a class="link-teal fw-bold"
                                                                                href="{{ url_for('login') }}">Login</a>
        </p>
    </section>
</main>

{% include 'front/share/footer.html' %}
</body>
</html>
